name: Panel semanal

# Corre 1 vez por semana (lunes 13:00 UTC) y tambien a mano desde la pestana Actions.
on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch: {}

# Permisos minimos para publicar en GitHub Pages via Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Si se dispara dos veces, que la ultima gane.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Correr Sistema A + B y generar la web
        run: python actualizar.py
        env:
          # Telegram apagado por defecto. Para activarlo, agrega estos Secrets
          # en Settings -> Secrets and variables -> Actions del repo.
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT: ${{ secrets.TELEGRAM_CHAT }}
      - name: Empaquetar el sitio (solo index.html)
        run: |
          mkdir -p _site
          cp index.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
